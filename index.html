<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Weather Dashboard Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0A0E1A;
            --header-color: #111827;
            --btn-color: #1A2035;
            --btn-pressed: #2A3A60;
            --btn-border: #2A3A55;
            --text-primary: #CDD8F0;
            --text-secondary: #7C8FA8;
            --hot-bg: #B71C1C;
            --mild-bg: #0D47A1;
            --cold-bg: #1A237E;
            --accent-red: #FF5252;
            --screen-width: 480px;
            --screen-height: 320px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #121212;
            color: white;
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Device Container */
        .device-frame {
            position: relative;
            padding: 20px;
            background: #222;
            border-radius: 20px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.1);
            border: 1px solid #333;
        }

        /* Screen Wrapper (Clipping) */
        .screen {
            width: var(--screen-width);
            height: var(--screen-height);
            background: var(--bg-color);
            overflow: hidden;
            position: relative;
            border-radius: 4px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            cursor: default;
            user-select: none;
        }

        /* TileView Emulator */
        .view-container {
            display: flex;
            width: calc(var(--screen-width) * 2);
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .view-container.show-detail {
            transform: translateX(-50%);
        }

        .page {
            width: var(--screen-width);
            height: 100%;
            flex-shrink: 0;
            position: relative;
        }

        /* --- Page 0: City List --- */
        .city-list-page {
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
        }

        header {
            width: 100%;
            height: 48px;
            background: var(--header-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 10;
        }

        header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        header .status {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            color: var(--accent-red);
        }

        .grid-container {
            flex: 1;
            padding: 8px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            scrollbar-width: none;
        }

        .grid-container::-webkit-scrollbar {
            display: none;
        }

        .city-btn {
            height: 48px;
            background: var(--btn-color);
            border: 1px solid var(--btn-border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
        }

        .city-btn:active {
            background: var(--btn-pressed);
            transform: scale(0.96);
        }

        .city-btn span {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* --- Page 1: Detail Weather --- */
        .detail-page {
            position: relative;
            background: var(--mild-bg);
            transition: background 0.5s ease;
        }

        .detail-overlay {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            transition: background 0.5s ease;
        }

        .back-btn {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 84px;
            height: 34px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            transition: background 0.2s;
        }

        .back-btn:active {
            background: rgba(0, 0, 0, 0.6);
        }

        .back-btn span {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: white;
        }

        .detail-content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 62px;
        }

        .city-name {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: white;
            margin-bottom: 20px;
        }

        .temperature {
            font-family: 'Montserrat', sans-serif;
            font-size: 64px;
            font-weight: 700;
            color: white;
            margin-bottom: 10px;
        }

        .condition {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 20px;
            font-weight: 400;
            color: #BBD4FF;
        }

        .info-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 52px;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .info-bar span {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            color: #AABBDD;
        }

        /* Loading Spinner */
        .loader {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            margin-top: -16px;
            margin-left: -16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-info {
            margin-top: 30px;
            font-size: 12px;
            color: #666;
            text-align: center;
            max-width: var(--screen-width);
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="device-frame">
        <div class="screen">
            <div id="viewContainer" class="view-container">
                <!-- Page 0: City List -->
                <div class="page city-list-page">
                    <header>
                        <h1>KOREA WEATHER</h1>
                        <span id="statusLabel" class="status"></span>
                    </header>
                    <div id="cityGrid" class="grid-container">
                        <!-- Buttons populated by JS -->
                    </div>
                </div>

                <!-- Page 1: Detail Weather -->
                <div id="detailPage" class="page detail-page">
                    <div id="detailOverlay" class="detail-overlay"></div>
                    <div class="back-btn" onclick="goBack()">
                        <span>< LIST</span>
                    </div>
                    <div class="detail-content">
                        <div id="cityName" class="city-name">서울</div>
                        <div id="tempVal" class="temperature">--°</div>
                        <div id="conditionVal" class="condition">Loading...</div>
                    </div>
                    <div class="info-bar">
                        <span id="detailsVal">Humidity: --% | Wind: --m/s</span>
                    </div>
                    <div id="loader" class="loader"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-info">
        ESP32_STOCK Preview Emulator (480x320)<br>
        OpenWeatherMap API 기반 리얼데이터 시뮬레이션
    </div>

    <script>
        const API_KEY = '1aef8f525b5be0bc4ab1ba0c3d558701';
        
        const cities = [
            {name: "고양", lat: 37.6584, lon: 126.8320},
            {name: "광주", lat: 35.1595, lon: 126.8526},
            {name: "구미", lat: 36.1194, lon: 128.3441},
            {name: "군포", lat: 37.3611, lon: 126.9353},
            {name: "김해", lat: 35.2335, lon: 128.8810},
            {name: "김포", lat: 37.6152, lon: 126.7156},
            {name: "남양주", lat: 37.6360, lon: 127.2165},
            {name: "대구", lat: 35.8714, lon: 128.6014},
            {name: "대전", lat: 36.3504, lon: 127.3845},
            {name: "부천", lat: 37.4841, lon: 126.7828},
            {name: "부산", lat: 35.1796, lon: 129.0756},
            {name: "성남", lat: 37.4200, lon: 127.1267},
            {name: "서울", lat: 37.5665, lon: 126.9780},
            {name: "수원", lat: 37.2636, lon: 127.0286},
            {name: "시흥", lat: 37.3801, lon: 126.8029},
            {name: "안산", lat: 37.3219, lon: 126.8308},
            {name: "안양", lat: 37.3943, lon: 126.9568},
            {name: "양산", lat: 35.3385, lon: 129.0264},
            {name: "용인", lat: 37.2411, lon: 127.1776},
            {name: "울산", lat: 35.5384, lon: 129.3114},
            {name: "의정부", lat: 37.7381, lon: 127.0337},
            {name: "인천", lat: 37.4563, lon: 126.7052},
            {name: "전주", lat: 35.8242, lon: 127.1480},
            {name: "제주", lat: 33.4996, lon: 126.5312},
            {name: "창원", lat: 35.2280, lon: 128.6811},
            {name: "천안", lat: 36.8151, lon: 127.1139},
            {name: "청주", lat: 36.6358, lon: 127.4912},
            {name: "파주", lat: 37.7600, lon: 126.7798},
            {name: "평택", lat: 36.9921, lon: 127.1129},
            {name: "포항", lat: 36.0190, lon: 129.3435},
            {name: "화성", lat: 37.1995, lon: 126.8312}
        ];

        const grid = document.getElementById('cityGrid');
        const viewContainer = document.getElementById('viewContainer');
        const detailOverlay = document.getElementById('detailOverlay');
        const loader = document.getElementById('loader');

        // Populate Grid
        cities.forEach((city, index) => {
            const btn = document.createElement('div');
            btn.className = 'city-btn';
            btn.innerHTML = `<span>${city.name}</span>`;
            btn.addEventListener('click', () => selectCity(index));
            grid.appendChild(btn);
        });

        function selectCity(idx) {
            const city = cities[idx];
            document.getElementById('cityName').textContent = city.name;
            document.getElementById('tempVal').textContent = '--°';
            document.getElementById('conditionVal').textContent = 'Fetching...';
            document.getElementById('detailsVal').textContent = '';
            
            viewContainer.classList.add('show-detail');
            fetchWeather(city);
        }

        function goBack() {
            viewContainer.classList.remove('show-detail');
        }

        async function fetchWeather(city) {
            loader.style.display = 'block';
            const url = `https://api.openweathermap.org/data/2.5/weather?lat=${city.lat}&lon=${city.lon}&appid=${API_KEY}&units=metric&lang=kr`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.cod !== 200) throw new Error(data.message);
                
                updateUI(data);
            } catch (err) {
                console.error(err);
                document.getElementById('conditionVal').textContent = 'Error: ' + err.message;
                detailOverlay.style.background = '#333';
            } finally {
                loader.style.display = 'none';
            }
        }

        function updateUI(data) {
            const temp = data.main.temp;
            const humidity = data.main.humidity;
            const wind = data.wind.speed;
            const desc = data.weather[0].description;
            
            document.getElementById('tempVal').textContent = temp.toFixed(1) + '°';
            document.getElementById('conditionVal').textContent = desc;
            document.getElementById('detailsVal').textContent = `Humidity: ${humidity}%  |  Wind: ${wind.toFixed(1)}m/s`;
            
            // Color Logic (Matches ESP32 Code)
            let color = '#1A237E'; // Cold
            if (temp > 25) color = '#B71C1C'; // Hot
            else if (temp > 10) color = '#0D47A1'; // Mild
            
            detailOverlay.style.background = color;
        }
    </script>
</body>
</html>
